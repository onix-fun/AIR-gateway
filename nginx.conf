worker_processes 1;
error_log /var/log/sparrow/gateway/error.log warn;

env DOMAIN_TOKEN_VALIDATE_URL;
env MQTT_AUTH_TIMEOUT_MS;
env IDENTITY_JWT_SECRET;
env IDENTITY_JWT_ISSUER;
env IDENTITY_JWT_AUDIENCE;

events {
    worker_connections 1024;
}

stream {
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    lua_socket_log_errors off;
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 1883;
        preread_buffer_size 16k;
        preread_timeout 5s;
        set $mqtt_upstream "mosquitto:1883";

        preread_by_lua_file /usr/local/openresty/nginx/lua/mqtt_auth_preread.lua;

        proxy_pass $mqtt_upstream;
        proxy_connect_timeout 3s;
        proxy_timeout 1h;
    }
}

http {
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    resolver 127.0.0.11 valid=10s ipv6=off;
    map $http_x_correlation_id $correlation_id {
        default $http_x_correlation_id;
        "" $request_id;
    }

    log_format sparrow '$time_iso8601 INFO correlation_id=$correlation_id traceparent=$http_traceparent logger=gateway - '
                       'remote_addr=$remote_addr method=$request_method path=$uri '
                       'status=$status bytes=$body_bytes_sent request_time=$request_time '
                       'upstream=$upstream_addr upstream_status=$upstream_status';
    access_log /var/log/sparrow/gateway/access.log sparrow;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    server {
        listen 8088;
        add_header X-Correlation-Id $correlation_id always;
        proxy_hide_header X-Correlation-Id;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;

        set $domain_upstream "domain:8080";
        set $analytics_upstream "analytics:8081";
        set $contacts_upstream "contacts-device-ws:8080";
        set $profile_upstream "profile:8080";
        set $minio_upstream "minio:9000";
        set $auth_client_id "";

        location = /health {
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        if ($request_method = OPTIONS) {
            return 204;
        }

        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type,Authorization,X-Correlation-Id" always;
        add_header Access-Control-Max-Age 86400 always;

        location = /api/auth {
            return 308 /api/auth/;
        }

        location /api/auth/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-Id $correlation_id;
            proxy_set_header traceparent $http_traceparent;
            proxy_set_header tracestate $http_tracestate;
            proxy_pass http://$profile_upstream;
        }

        location = /api/users/me {
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_auth.lua;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Client-Id $auth_client_id;
            proxy_set_header X-Correlation-Id $correlation_id;
            proxy_set_header traceparent $http_traceparent;
            proxy_set_header tracestate $http_tracestate;
            proxy_pass http://$profile_upstream;
        }

        location = /api/users/me/avatar {
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_auth.lua;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Client-Id $auth_client_id;
            proxy_set_header X-Correlation-Id $correlation_id;
            proxy_set_header traceparent $http_traceparent;
            proxy_set_header tracestate $http_tracestate;
            proxy_pass http://$profile_upstream;
        }

        location /api/users/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-Id $correlation_id;
            proxy_set_header traceparent $http_traceparent;
            proxy_set_header tracestate $http_tracestate;
            proxy_pass http://$profile_upstream;
        }

        location /api/sessions {
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_auth.lua;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Client-Id $auth_client_id;
            proxy_set_header X-Correlation-Id $correlation_id;
            proxy_set_header traceparent $http_traceparent;
            proxy_set_header tracestate $http_tracestate;
            proxy_pass http://$profile_upstream;
        }

        location /api/avatars/ {
            rewrite ^/api/avatars/(.*) /avatars/$1 break;
            proxy_set_header Host "minio:9000";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://$minio_upstream;
        }

        location /api/search/ {
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_auth.lua;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Client-Id $auth_client_id;
            proxy_set_header X-Correlation-Id $correlation_id;
            proxy_set_header traceparent $http_traceparent;
            proxy_set_header tracestate $http_tracestate;
            proxy_pass http://$profile_upstream;
        }

        location = /api/domain {
            return 308 /api/domain/;
        }

        location /api/domain/ {
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_auth.lua;
            rewrite ^/api/domain/?(.*)$ /$1 break;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Client-Id $auth_client_id;
            proxy_set_header X-Correlation-Id $correlation_id;
            proxy_set_header traceparent $http_traceparent;
            proxy_set_header tracestate $http_tracestate;
            proxy_redirect ~^(/.*)$ $scheme://$http_host/api/domain$1;
            proxy_redirect ~^https?://[^/]+(/.*)$ $scheme://$http_host/api/domain$1;
            proxy_pass http://$domain_upstream;
        }

        location = /api/analytics {
            return 308 /api/analytics/;
        }

        location /api/analytics/ {
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_auth.lua;
            rewrite ^/api/analytics/?(.*)$ /$1 break;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Client-Id $auth_client_id;
            proxy_set_header X-Correlation-Id $correlation_id;
            proxy_set_header traceparent $http_traceparent;
            proxy_set_header tracestate $http_tracestate;
            proxy_pass http://$analytics_upstream;
        }

        location = /api/contacts/ws {
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_auth.lua;
            rewrite ^/api/contacts/?(.*)$ /$1 break;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Client-Id $auth_client_id;
            proxy_set_header X-Correlation-Id $correlation_id;
            proxy_set_header traceparent $http_traceparent;
            proxy_set_header tracestate $http_tracestate;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            proxy_pass http://$contacts_upstream;
        }

        location /api/contacts/ws/ {
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_auth.lua;
            rewrite ^/api/contacts/?(.*)$ /$1 break;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Client-Id $auth_client_id;
            proxy_set_header X-Correlation-Id $correlation_id;
            proxy_set_header traceparent $http_traceparent;
            proxy_set_header tracestate $http_tracestate;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            proxy_pass http://$contacts_upstream;
        }

        location / {
            default_type application/json;
            return 404 '{"error":"not_found","message":"Route not found"}';
        }
    }
}
