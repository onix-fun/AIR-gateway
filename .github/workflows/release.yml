name: Release gateway image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Lua parser
        run: |
          docker run --rm \
            -v "$PWD":/gateway \
            -w /gateway \
            openresty/openresty:1.27.1.2-0-alpine-fat \
            resty tests/test_mqtt_parser.lua

      - name: Prepare runtime dependencies
        run: |
          mkdir -p build/docker/site-lualib
          docker run --rm \
            -v "$PWD/build/docker/site-lualib":/site-lualib \
            openresty/openresty:1.27.1.2-0-alpine-fat \
            /bin/sh -c "opm get ledgetech/lua-resty-http && opm get fffonion/lua-resty-openssl && cp -R /usr/local/openresty/site/lualib/. /site-lualib/"
          touch build/docker/log-placeholder

      - name: Test browser security and JWT
        run: |
          docker run --rm \
            -v "$PWD":/gateway \
            -w /gateway \
            openresty/openresty:1.27.1.2-0-alpine-fat \
            /bin/sh -c "opm get fffonion/lua-resty-openssl && resty tests/test_browser_security.lua && resty tests/test_jwt_auth.lua"

      - name: Test real RS256 verification
        run: |
          tmp_dir="$(mktemp -d)"
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out "$tmp_dir/private.pem"
          openssl pkey -in "$tmp_dir/private.pem" -pubout -out "$tmp_dir/public.pem"
          token="$(tests/generate-rs256-token.sh "$tmp_dir/private.pem")"
          docker run --rm \
            -v "$PWD":/gateway \
            -v "$tmp_dir/public.pem":/tmp/public.pem:ro \
            -e IDENTITY_JWT_PUBLIC_KEY_PATH=/tmp/public.pem \
            -e TEST_RS256_TOKEN="$token" \
            -w /gateway \
            openresty/openresty:1.27.1.2-0-alpine-fat \
            /bin/sh -c "opm get fffonion/lua-resty-openssl && resty tests/test_rs256_token.lua"

      - name: Resolve image metadata
        id: image
        run: |
          image_name="${GITHUB_REPOSITORY,,}"
          echo "name=ghcr.io/${image_name}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.tag }}
